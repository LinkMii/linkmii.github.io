<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkMii Install</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="Tab.png">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  color: white;
}

@font-face {
  font-family: "MyBold";
  src: url("font(BOLD).otf");
}

body {
  background: linear-gradient(to bottom, #0f4c5c, #1b7f5c);
  display: flex;
  justify-content: center;
  align-items: center;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateY(-120px);
}

.logo {
  width: 450px;
  max-width: 90vw;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

#tagline {
  margin-top: -5px;
  font-size: clamp(1.2rem, 4vw, 2rem);
  font-family: "MyBold", sans-serif;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1s;
  text-align: center;
}

.button-row {
  display: flex;
  gap: 40px;
  margin-top: 30px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1.2s;
}

.button {
  position: relative;
  cursor: pointer;
  width: min(240px, 40vw);
  transition: transform 0.2s ease;
}

.button img {
  width: 100%;
  display: block;
}

.button span {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: "MyBold", sans-serif;
  font-size: clamp(0.8rem, 2vw, 1.2rem);
  color: black;
  pointer-events: none;
}

.button:hover {
  transform: scale(1.1);
}

@media (max-width: 600px) {
  .button-row {
    flex-direction: column;
    gap: 20px;
  }

  .wrapper {
    transform: translateY(-80px);
  }
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<div class="wrapper">

<img class="logo" src="logo.png">
  
  <div class="button-row">
    <div class="button" onclick="installWii()">
      <img src="button.png">
      <span>Install on Wii</span>
    </div>

    <div class="button" onclick="installDolphin()">
      <img src="button.png">
      <span>Install on Dolphin</span>
    </div>
  </div>

</div>

<script>
function installWii() {
  window.location.href = "installwii.html";
}

function installDolphin() {
  window.location.href = "installdolphin.html";
}
</script>

</body>
</html>
