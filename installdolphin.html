<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LinkMii - Dolphin Install</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="Tab.png">

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow-y: auto;
  color: white;
}

@font-face {
  font-family: "MyBold";
  src: url("font(BOLD).otf");
}

body {
  background: linear-gradient(to bottom, #0f4c5c, #1b7f5c);
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 60px;
  margin-bottom: 60px;
  max-width: 900px;
  width: 100%;
}

.logo {
  width: 300px;
  max-width: 90vw;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

#title {
  margin-top: 10px;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-family: "MyBold", sans-serif;
  font-weight: normal;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 0.5s;
}

.steps {
  margin-top: 30px;
  font-family: "MyBold", sans-serif;
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  text-align: center;
  line-height: 1.6;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1s;
}

.images {
  display: flex;
  flex-direction: column;
  gap: 20px;
  margin-top: 30px;
  width: 100%;
  align-items: center;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1.2s;
}

.images img {
  width: 100%;
  max-width: 800px;
  height: auto;
  border-radius: 15px;
}

.button {
  margin-top: 30px;
  position: relative;
  cursor: pointer;
  width: min(240px, 50vw);
  transition: transform 0.2s ease;
  opacity: 0;
  animation: fadeInNoTransform 2s ease forwards;
  animation-delay: 1.4s;
}

.button img {
  width: 100%;
  display: block;
}

.button span {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "MyBold";
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: black;
}

.button:hover {
  transform: scale(1.1);
}

.back-button {
  margin-top: 20px;
  animation-delay: 1.6s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

@keyframes fadeInNoTransform {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>
<body>

<div class="wrapper">

  <img class="logo" src="logo.png">

  <div id="title">Install Guide</div>

  <div class="steps">
    <p>First. Open Dolphin</p>
    <p>Second. Go to the "Tools" tab and click on "Install WAD"</p>
    <p>Third. Install the WAD, boot the Wii System Menu, and enjoy using the service!</p>
  </div>

  <div class="images">
    <img src="installwad.png">
    <img src="wad.png">
  </div>



  <div class="button back-button" onclick="goBack()">
    <img src="button.png">
    <span>Back</span>
  </div>

</div>



function goBack() {
  window.location.href = "https://linkmii.github.io/main/";
}
</script>

</body>
</html>
