<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkMii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="Tab.png">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      color: white;
    }

    @font-face {
      font-family: "MyBold";
      src: url("font(BOLD).otf");
    }

    body {
      background: linear-gradient(
        to bottom,
        #0f4c5c,
        #1b7f5c
      );
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translateY(-120px);
    }

    img {
      width: 450px;
      max-width: 80vw;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    #tagline {
      margin-top: -5px;
      font-size: 2rem;
      font-family: "MyBold", sans-serif;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 1s;
      text-align: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <img src="logo.png" alt="Logo">
    <div id="tagline"></div>
  </div>

  <script>
    const year = new Date().getFullYear();
    document.getElementById("tagline").textContent = `Revive Your Wii In ${year}!`;
  </script>

</body>
</html>
